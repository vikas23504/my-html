<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="shop.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">

    <title>Shop page</title>

</head>
<body>
    
<!-- NAVBAR START -->
<header class="navbar">

    <div class="logo">
        LUXE
    </div>

   
    <nav class="nav-links">
        <a href="#">Home</a>
        <a href="shop.html">Shop</a>
        <a href="#">About</a>
        <a href="#">Contact</a>
    </nav>

   
    <div class="icons">
        <span><i class="fa-solid fa-magnifying-glass"></i></span>
        <span><i class="fa-solid fa-heart"></i></span>
        <span><i class="fa-solid fa-cart-arrow-down"></i></span>
        <span><i class="fa-solid fa-users"></i></span>
    </div>
     <div class="menuicon">
        <i class="fa-solid fa-bars"></i>
    </div>
    </header>
<!-- shop all project -->
    <section class="shop-header">

    <div class="shop-title">

        <h2>Shop All Products</h2>

        <div class="breadcrumb">
            <a class="home" href="#">Home</a>
            <span>
                <
            </span>
            <a href="#">Shop</a>
        </div>

    </div>

</section>

<!-- show 12 product  -->

<section class="shop-products">

    <div class="top-bar">
        <p>Showing 12  products</p>

        <select>
            <option>Most Popular</option>
            <option>Price Low to High</option>
            <option>Price High to Low</option>
        </select>
    </div>

    <!-- filter + product -->

    <div class="shop-layout">

        <!-- filter -->

       <div class="filters">

<h3><i class="fa-solid fa-filter"></i>Filters</h3>

<div class="filter-category">
<h4>Category</h4>
<div class="checkbox">

<label>
<input type="checkbox"> Men
</label>

<label>
<input type="checkbox"> Women
</label>

<label>
<input type="checkbox"> Kids
</label>

<label>
<input type="checkbox"> Accessories
</label>

</div>

</div>

<div class="filter-price">
<h4>Price Range</h4>
<input type="range" min="0" max="300">

<div class="price">
<span>$0</span>
<span>$300</span>
</div>

</div>

<div class="filter-size">
<h4>Size</h4>
<button>XS</button>
<button>S</button>
<button>M</button>
<button>L</button>
<button>XL</button>
</div>

<div class="filter-color">
<h4 >Color</h4>
<span class="red black" ></span>
<span class="red white"></span>
<span class="red gray"></span>
<span class="red yellow"></span>
<span class="red blue"></span>
<span class="red cred"></span>
</div>

<button class="clear-filter">Clear All Filters</button>

</div>
       



    </div>

</section>
</body>
</html>
